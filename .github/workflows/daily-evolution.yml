name: Daily Autonomous Evolution

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  evolve-platform:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Collect Latest Data
        run: npm run collect-data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Generate Daily Task Plan
        run: npm run generate-task

      - name: Install Open Source Agent (Aider)
        run: python -m pip install aider-chat

      - name: Run Agent (Free via GitHub Models)
        run: |
          PLAN_FILE=$(ls docs/backlog/features/FEAT-*_daily_evolution.md | head -n 1)
          aider --model openai/gpt-4o-mini --yes --message-file "$PLAN_FILE" --read CLAUDE.md --file src/App.tsx
        env:
          # This uses your built-in, free GitHub token with GitHub Models!
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_BASE: https://models.inference.ai.azure.com

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(auto): daily evolution and data sync" && git push)
